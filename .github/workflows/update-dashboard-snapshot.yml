name: Update Dashboard Snapshot

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate dashboard snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run snapshot

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- public/data/dashboard-snapshot.json; then
            echo "No snapshot changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/dashboard-snapshot.json
          git commit -m "Update dashboard snapshot"
          git push
